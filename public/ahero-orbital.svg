  <circle cx="260" cy="200" r="72" fill="url(#ring)" opacity="0.22" filter="url(#blur)"/>
  <circle cx="260" cy="200" r="54" fill="#fff" fill-opacity="0.12"/>
  <circle cx="260" cy="200" r="38" fill="url(#ring)" opacity="0.35"/>
  <circle cx="352" cy="118" r="14" fill="#fff" fill-opacity="0.55"/>
