<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop stop-color="#c4b5fd" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#93c5fd" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e0e7ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="80" y1="60" x2="440" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
