# Example: reverse-proxy Toollabz Next.js standalone (Node) behind nginx.
# Root cause of “unstyled HTML” is often nginx serving / from disk OR stripping /_next/static.
# Fix: proxy ALL paths (including /_next/static/*) to the Node listener unless you intentionally offload static to CDN.

upstream toollabz_node {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  server_name toollabz.com;

  # ssl_certificate ...;
  # ssl_certificate_key ...;

  client_max_body_size 25m;

  # Do NOT add: location /_next/static { root /var/www/html; } unless that path mirrors
  # .next/standalone/.next/static — otherwise CSS/JS 404 and the site is unstyled.

  location / {
    proxy_pass http://toollabz_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }
}
