# After merge to main, hint Google that sitemap may have changed (best-effort).
name: Content Engine — Post-merge sitemap ping

on:
  push:
    branches:
      - main
    paths:
      - "lib/blog/articles/**"
      - "lib/blog/articles.manifest.ts"
      - "lib/tools/data.ts"

jobs:
  ping-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Ping sitemap endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CONTENT_ENGINE_SECRET: ${{ secrets.CONTENT_ENGINE_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL:-}" ] || [ -z "${CONTENT_ENGINE_SECRET:-}" ]; then
            echo "Skipping ping: SITE_URL or CONTENT_ENGINE_SECRET not configured."
            exit 0
          fi
          BASE="${SITE_URL%/}"
          echo "Posting to ${BASE}/api/content-engine/ping-sitemap"
          curl -fsS -X POST "${BASE}/api/content-engine/ping-sitemap" \
            -H "x-toollabz-secret: ${CONTENT_ENGINE_SECRET}" \
            -H "Accept: application/json" \
            --max-time 120
          echo
          echo "Ping request completed."
